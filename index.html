<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thunkable Voice Bridge</title>
    
    <script src="https://thunkable.github.io/webviewer-extension/thunkableWebviewerExtension.js" type="text/javascript"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
    </style>
</head>
<body>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/v2/bootstrap.js?v=1"></script>
    <df-messenger
      intent="WELCOME"
      chat-title="AI Assistant"
      agent-id="cyberdude-ffpp"
      language-code="en"
    ></df-messenger>

    <script>
        // This function detects when the bot sends a text response
        window.addEventListener('df-response-received', function (event) {
            
            // Extract the text message from the Dialogflow JSON response
            const botText = event.detail.data?.messages?.[0]?.text?.text?.[0] 
                           || event.detail.response?.queryResult?.fulfillmentText;

            if (botText) {
                // This line sends the text to your Thunkable 'receivesMessage' block
                ThunkableWebviewerExtension.postMessage(botText);
            }
        });
    </script>

</body>
</html>
