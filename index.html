<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cyberdude Assistant</title>
    
    <script src="https://thunkable.github.io/webviewer-extension/thunkableWebviewerExtension.js" type="text/javascript"></script>

    <style>
        /* This makes the chat fill the entire Web Viewer screen */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        df-messenger {
            position: fixed;
            bottom: 0;
            right: 0;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
        }
    </style>
</head>
<body>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/v2/bootstrap.js?v=1"></script>
    <df-messenger
      intent="WELCOME"
      chat-title="Cyberdude"
      agent-id="YOUR_AGENT_ID_HERE"
      language-code="en"
      expand="true"> </df-messenger>

    <script>
        // 3. THE "TALK BACK" SCRIPT
        window.addEventListener('df-response-received', function (event) {
            const botText = event.detail.data?.messages?.[0]?.text?.text?.[0] 
                           || event.detail.response?.queryResult?.fulfillmentText;
            if (botText) {
                ThunkableWebviewerExtension.postMessage(botText);
            }
        });
    </script>
</body>
</html>
